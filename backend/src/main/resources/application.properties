spring.application.name=placefinder
server.port=8080

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=place_finder;encrypt=true;trustServerCertificate=true
spring.datasource.username=${DB_USERNAME:placefinder}
spring.datasource.password=${DB_PASSWORD:changeme}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

server.error.include-message=always
